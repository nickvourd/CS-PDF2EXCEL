<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="pdfGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="xlsxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.5">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200"/>
    <path d="M120 0 V480 M240 0 V480 M360 0 V480 M480 0 V480 M600 0 V480 M720 0 V480 M840 0 V480 M960 0 V480 M1080 0 V480"/>
  </g>

  <!-- terminal window chrome -->
  <rect x="40" y="40" width="1120" height="400" rx="14" fill="#0b0f17" stroke="#30363d" stroke-width="1"/>
  <circle cx="68" cy="68" r="7" fill="#ef4444"/>
  <circle cx="92" cy="68" r="7" fill="#f59e0b"/>
  <circle cx="116" cy="68" r="7" fill="#22c55e"/>
  <text x="600" y="73" fill="#6b7280" font-size="13" text-anchor="middle">~/cs-pdf2excel — zsh</text>

  <!-- title -->
  <text x="600" y="170" text-anchor="middle" font-size="64" font-weight="800" fill="url(#title)" filter="url(#glow)">
    CS-PDF2EXCEL
  </text>
  <text x="600" y="205" text-anchor="middle" font-size="16" fill="#9ca3af">
    Cobalt Strike Sessions Report  →  Excel converter
  </text>

  <!-- PDF document -->
  <g transform="translate(180,250)">
    <rect width="160" height="180" rx="6" fill="url(#pdfGrad)" stroke="#7f1d1d" stroke-width="1"/>
    <polygon points="160,0 130,0 160,30" fill="#7f1d1d"/>
    <text x="80" y="45" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">PDF</text>
    <g stroke="#fecaca" stroke-width="2" opacity="0.85">
      <line x1="20" y1="80" x2="140" y2="80"/>
      <line x1="20" y1="100" x2="140" y2="100"/>
      <line x1="20" y1="120" x2="120" y2="120"/>
      <line x1="20" y1="140" x2="140" y2="140"/>
      <line x1="20" y1="160" x2="100" y2="160"/>
    </g>
    <text x="80" y="205" text-anchor="middle" fill="#9ca3af" font-size="12">Sessions Report</text>
  </g>

  <!-- arrow -->
  <g transform="translate(380,330)" stroke="#f97316" stroke-width="3" fill="none">
    <line x1="0" y1="10" x2="160" y2="10"/>
    <polyline points="140,-8 160,10 140,28"/>
  </g>
  <text x="460" y="312" text-anchor="middle" fill="#f97316" font-size="13" font-weight="600" letter-spacing="2">PARSE</text>

  <!-- Excel stack -->
  <g transform="translate(580,250)">
    <!-- back sheets -->
    <rect x="20" y="20" width="160" height="180" rx="6" fill="#166534" stroke="#14532d"/>
    <rect x="10" y="10" width="160" height="180" rx="6" fill="#15803d" stroke="#14532d"/>
    <rect x="0"  y="0"  width="160" height="180" rx="6" fill="url(#xlsxGrad)" stroke="#14532d"/>
    <text x="80" y="45" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">XLSX</text>
    <!-- mini grid -->
    <g stroke="#bbf7d0" stroke-width="1" opacity="0.6">
      <rect x="20" y="70" width="120" height="90" fill="none"/>
      <line x1="20" y1="100" x2="140" y2="100"/>
      <line x1="20" y1="130" x2="140" y2="130"/>
      <line x1="60" y1="70" x2="60" y2="160"/>
      <line x1="100" y1="70" x2="100" y2="160"/>
    </g>
    <text x="80" y="180" text-anchor="middle" fill="#dcfce7" font-size="11">4 sheets</text>
  </g>

  <!-- sheet tabs / labels on the right -->
  <g transform="translate(800,250)" font-size="13">
    <g>
      <rect x="0"   y="0"   width="220" height="34" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
      <text x="14"  y="22" fill="#86efac" font-weight="600">●  Sessions</text>
    </g>
    <g transform="translate(0,46)">
      <rect width="220" height="34" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
      <text x="14" y="22" fill="#86efac" font-weight="600">●  CommunicationPaths</text>
    </g>
    <g transform="translate(0,92)">
      <rect width="220" height="34" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
      <text x="14" y="22" fill="#86efac" font-weight="600">●  FileHashes</text>
    </g>
    <g transform="translate(0,138)">
      <rect width="220" height="34" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
      <text x="14" y="22" fill="#86efac" font-weight="600">●  Activities</text>
    </g>
  </g>

  <!-- footer -->
  <text x="600" y="425" text-anchor="middle" fill="#6b7280" font-size="13">
    Created with &lt;3 by @nickvourd
  </text>
</svg>
